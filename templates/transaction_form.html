{% extends "base.html" %}
{% from "_macros.html" import csrf %}
{% block content %}
<h3>New Transaction</h3>
<form method="post" class="card-soft p-4" style="max-width:640px;">
  {{ csrf() }}
  <div class="btn-group mb-3 w-100" role="group">
    <input type="radio" class="btn-check" name="kind" value="expense" id="k-exp" checked>
    <label class="btn btn-outline-danger" for="k-exp">Expense</label>
    <input type="radio" class="btn-check" name="kind" value="income" id="k-inc">
    <label class="btn btn-outline-success" for="k-inc">Income</label>
    <input type="radio" class="btn-check" name="kind" value="transfer" id="k-tx">
    <label class="btn btn-outline-primary" for="k-tx">Transfer</label>
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Account</label>
      <select class="form-select" name="account_id" required>
        {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-6" id="to-account-wrap" style="display:none">
      <label class="form-label">To Account</label>
      <select class="form-select" name="to_account_id">
        {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Date</label>
      <input class="form-control" type="date" name="date" value="{{ today }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Amount ($)</label>
      <input class="form-control" type="number" step="0.01" name="amount" required>
    </div>
    <div class="col-md-6" id="category-wrap">
      <label class="form-label">Category</label>
      <select class="form-select" name="category_id">
        <option value="">— uncategorized —</option>
        {% for c in categories %}<option value="{{ c.id }}">{{ c.group_name }} / {{ c.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Payee</label>
      <input class="form-control" name="payee">
    </div>
    <div class="col-12">
      <label class="form-label">Memo</label>
      <input class="form-control" name="memo">
    </div>
    <div class="col-12 form-check ms-2">
      <input class="form-check-input" type="checkbox" name="cleared" id="cl">
      <label class="form-check-label" for="cl">Cleared (already posted at bank)</label>
    </div>
  </div>
  <div class="mt-4">
    <button class="btn btn-primary">Save</button>
    <a class="btn btn-link" href="{{ url_for('transactions_list') }}">Cancel</a>
  </div>
</form>

<script>
  function refreshKind() {
    const kind = document.querySelector('input[name=kind]:checked').value;
    document.getElementById('to-account-wrap').style.display = (kind === 'transfer') ? '' : 'none';
    document.getElementById('category-wrap').style.display   = (kind === 'transfer') ? 'none' : '';
  }
  document.querySelectorAll('input[name=kind]').forEach(r => r.addEventListener('change', refreshKind));
  refreshKind();
</script>
{% endblock %}
