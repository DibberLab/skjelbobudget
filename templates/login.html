{% extends "base.html" %}
{% from "_macros.html" import csrf %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card-soft p-4 mt-5">
      <h3 class="mb-3">Sign in</h3>
      <form method="post" action="{{ url_for('auth.login') }}">
        {{ csrf() }}
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" required autofocus autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required autocomplete="current-password">
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" name="remember" id="rem" checked>
          <label class="form-check-label" for="rem">Remember me on this device</label>
        </div>
        <button class="btn btn-primary w-100">Sign in</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
